x-common-env: &common-env
  env_file:
    - ./backend/.env

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: orix_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ORIX_DB}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-febrero13}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ORIX_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - orix_net

  redis:
    image: redis:7.2-alpine
    container_name: orix_redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - orix_net

  # ─── FastAPI + Socket.IO API ─────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orix_api
    <<: *common-env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-febrero13}@postgres:5432/${POSTGRES_DB:-ORIX_DB}
      REDIS_URL: redis://redis:6379/0
      MODEL_CACHE: /app/models
    volumes:
      - model_cache:/app/models
    restart: unless-stopped
    networks:
      - orix_net

  # ─── GPU Workers ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: orix_worker
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-febrero13}@postgres:5432/${POSTGRES_DB:-ORIX_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - model_cache:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - orix_net

  # ─── OSINT Service (optional, CPU only) ──────────────────────────────────────
  # Disabled by default. Enable with: docker compose --profile osint up
  osint-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orix_osint
    <<: *common-env
    profiles:
      - osint
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-febrero13}@postgres:5432/${POSTGRES_DB:-ORIX_DB}
      REDIS_URL: redis://redis:6379/0
      OSINT_ENABLED: "true"
      USE_GPU: "false"
    ports:
      - "${OSINT_PORT:-8001}:8000"
    restart: unless-stopped
    networks:
      - orix_net

  # ─── React Frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orix_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - orix_net

volumes:
  postgres_data:
  model_cache:

networks:
  orix_net:
    driver: bridge
